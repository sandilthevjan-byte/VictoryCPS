<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CPS Tester - Victory</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    header {
      background-color: #222;
      color: #fff;
      padding: 15px;
    }
    h1 {
      margin: 0;
    }
    #cps-area {
      margin-top: 30px;
    }
    button {
      font-size: 20px;
      padding: 15px 30px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
    }
    button:hover {
      background-color: #45a049;
    }
    #result {
      font-size: 24px;
      margin-top: 20px;
      color: #333;
    }
    .images {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 40px;
    }
    .images img {
      max-width: 200px;
      border: 2px solid #333;
      border-radius: 8px;
      background-color: #fff;
      padding: 5px;
    }
    footer {
      margin-top: 40px;
      background-color: #222;
      color: #fff;
      padding: 15px;
    }
  </style>
</head>
<body>
  <header>
    <h1>CPS Tester - Victory</h1>
    <p>Test your clicks per second!</p>
  </header>

  <main>
    <section id="cps-area">
      <button id="start">Start Test</button>
      <button id="click" disabled>Click Me!</button>
      <div id="result">Your CPS will appear here.</div>
    </section>

    <section id="gallery">
      <h2>Gallery</h2>
      <div class="images">
        <img src="Vic.png" alt="Vic Image">
        <img src="Bloxd1.png" alt="Bloxd1 Image">
        <img src="bloxd.png" alt="Bloxd Image">
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Victory CPS Tester. All rights reserved.</p>
  </footer>

  <script>
    let clicks = 0;
    let startTime;
    let testDuration = 5; // seconds

    const startBtn = document.getElementById("start");
    const clickBtn = document.getElementById("click");
    const resultDiv = document.getElementById("result");

    startBtn.addEventListener("click", () => {
      clicks = 0;
      startTime = Date.now();
      resultDiv.textContent = "Test started! Click as fast as you can!";
      clickBtn.disabled = false;

      setTimeout(() => {
        clickBtn.disabled = true;
        let elapsed = (Date.now() - startTime) / 1000;
        let cps = (clicks / elapsed).toFixed(2);
        resultDiv.textContent = `You clicked ${clicks} times in ${elapsed.toFixed(1)}s. CPS: ${cps}`;
      }, testDuration * 1000);
    });

    clickBtn.addEventListener("click", () => {
      clicks++;
    });
  </script>
</body>
</html>
