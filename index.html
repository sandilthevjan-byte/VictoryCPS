<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WANNA TEST UR CPS powered by Vic.Jr</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    header {
      background: linear-gradient(90deg, #ff0000, #ff9900);
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
    }
    #controls {
      margin: 20px;
    }
    select, button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    button {
      background-color: #4CAF50;
      color: white;
    }
    button:hover {
      background-color: #45a049;
    }
    #clickBtn {
      font-size: 24px;
      padding: 20px 40px;
      background-color: #ff4444;
    }
    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
    .images {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 40px;
    }
    .images img {
      max-width: 200px;
      border: 2px solid #fff;
      border-radius: 8px;
      box-shadow: 0 0 20px #ff0000;
      background-color: #222;
      padding: 5px;
    }
    footer {
      margin-top: 40px;
      background-color: #222;
      padding: 15px;
      font-size: 18px;
    }
    .watermark {
      font-size: 14px;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>WANNA TEST UR CPS powered by Vic.Jr</header>

  <div id="controls">
    <label for="timer">Choose Test Duration:</label>
    <select id="timer">
      <option value="1">1 Second</option>
      <option value="5">5 Seconds</option>
      <option value="10">10 Seconds</option>
      <option value="20">20 Seconds</option>
      <option value="30">30 Seconds</option>
    </select>
    <button id="startBtn">Start Test</button>
    <button id="clickBtn" disabled>Click Me!</button>
  </div>

  <div id="result">Your CPS will appear here.</div>

  <div class="images">
    <img src="Vic.png" alt="Vic Image">
    <img src="Bloxd1.png" alt="Bloxd1 Image">
    <img src="bloxd.png" alt="Bloxd Image">
  </div>

  <footer>
    Subscribe to Victory.JR
    <div class="watermark">Watermark: Pro PVPER</div>
  </footer>

  <script>
    let clicks = 0;
    let startTime;
    let duration;

    const startBtn = document.getElementById("startBtn");
    const clickBtn = document.getElementById("clickBtn");
    const resultDiv = document.getElementById("result");
    const timerSelect = document.getElementById("timer");

    startBtn.addEventListener("click", () => {
      clicks = 0;
      duration = parseInt(timerSelect.value);
      startTime = Date.now();
      resultDiv.textContent = "Test started! Click as fast as you can!";
      clickBtn.disabled = false;

      setTimeout(() => {
        clickBtn.disabled = true;
        let elapsed = (Date.now() - startTime) / 1000;
        let cps = (clicks / elapsed).toFixed(2);
        let message = "";

        if (cps < 2) {
          message = "CPS: " + cps + " — Don’t be a loser, try again!";
        } else if (cps < 5) {
          message = "CPS: " + cps + " — Not bad, keep practicing!";
        } else if (cps < 8) {
          message = "CPS: " + cps + " — Pretty fast, you’re improving!";
        } else if (cps < 10) {
          message = "CPS: " + cps + " — Great speed, almost a pro!";
        } else {
          message = "CPS: " + cps + " — You’re the cheetah!";
        }

        resultDiv.textContent = message;
      }, duration * 1000);
    });

    clickBtn.addEventListener("click", () => {
      clicks++;
    });
  </script>
</body>
</html>
